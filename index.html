<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Turkcell 6 Sigma Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--t-blue:#001a35;
--t-yellow:#FFCB05;
--t-light:#0047BB;
--bg:#0f0f0f;
--card-bg:#1a1a1a;
--text:#ffffff;
--up-green:#00ff00;
--down-red:#ff3333;
--border:#333;
--kpi-bg:#2d2d2d;
}

[data-theme="light"]{
--bg:#f4f7f6;
--card-bg:#ffffff;
--text:#1a1a1a;
--border:#ddd;
--kpi-bg:#f8f9fa;
}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
display:flex;
flex-direction:row;
transition:all .3s ease;
}

.sidebar{
width:320px;
background:var(--t-blue);
height:100vh;
color:white;
padding:25px;
position:fixed;
box-sizing:border-box;
overflow-y:auto;
border-right:1px solid #333;
z-index:1000;
}

.sidebar-logo{
width:100%;
max-width:250px;
margin:0 auto 30px;
display:block;
}

.sidebar h2{
color:var(--t-yellow);
border-bottom:2px solid var(--t-yellow);
padding-bottom:10px;
margin-bottom:25px;
font-size:1.1rem;
}

label{
display:block;
margin:15px 0 5px;
font-weight:bold;
font-size:.85rem;
color:#ccc;
}

select,.search-box{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #444;
margin-bottom:15px;
font-size:.95rem;
background:#2d2d2d;
color:white;
cursor:pointer;
outline:none;
}

.theme-btn{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:var(--t-yellow);
color:#000;
font-weight:bold;
cursor:pointer;
margin-top:20px;
font-size:.9rem;
}

.content{
margin-left:320px;
padding:30px;
width:calc(100% - 320px);
box-sizing:border-box;
}

.card{
background:var(--card-bg);
border-radius:12px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,.2);
margin-bottom:25px;
border:1px solid var(--border);
transition:background .3s;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.kpi-box{
background:var(--kpi-bg);
padding:12px;
border-radius:10px;
text-align:center;
border:1px solid var(--border);
}

.kpi-box span{
font-size:.6rem;
color:#888;
text-transform:uppercase;
font-weight:bold;
display:block;
margin-bottom:5px;
}

.kpi-box h3{
margin:0;
color:var(--text);
font-size:1rem;
}

.trend-pill{
font-size:.75rem;
font-weight:900;
padding:2px 8px;
border-radius:4px;
margin-left:5px;
}

.trend-up{
color:#000!important;
background:var(--up-green);
}

.trend-down{
color:#fff!important;
background:var(--down-red);
}

.performance-list{
list-style:none;
padding:0;
margin:20px 0 0;
border-top:1px solid var(--border);
}

.list-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 5px;
border-bottom:1px solid var(--border);
font-size:.9rem;
}

.val-num{
font-weight:bold;
color:var(--t-light);
}

.staff-table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.staff-table th{
text-align:left;
padding:12px;
border-bottom:2px solid var(--border);
color:var(--t-light);
}

.staff-table td{
padding:10px;
border-bottom:1px solid var(--border);
color:var(--text);
}

.chart-container{
position:relative;
height:350px;
width:100%;
}

@media screen and (max-width:768px){

body{flex-direction:column}

.sidebar{
width:100%;
height:auto;
position:relative;
border-right:none;
}

.content{
margin-left:0;
width:100%;
padding:15px;
}

.kpi-grid{
grid-template-columns:1fr 1fr;
}

}
</style>
</head>

<body>

<div class="sidebar">

<img src="image_3.png" class="sidebar-logo">

<h2>DÖNEMSEL ANALİZ</h2>

<label>BÖLGE FİLTRESİ</label>
<select id="regionSelect" onchange="runDashboard()">
<option value="Hepsi">Tüm Türkiye</option>
</select>

<label>SIRALAMA KRİTERİ</label>
<select id="metricFilter" onchange="updateTop10Chart()">
<option value="-1">Toplam Puan</option>
<option value="0">Bütçe Değişim</option>
<option value="1">Yenileme</option>
<option value="2">Fesih İbra</option>
<option value="3">Rollout</option>
<option value="4">Sabit Artış</option>
<option value="5">Genel İşlem</option>
</select>

<label>PERSONEL SEÇİMİ</label>
<select id="personSelect" onchange="updateView()"></select>

<button class="theme-btn" id="themeToggle" onclick="toggleTheme()">GÜNDÜZ MODUNA GEÇ</button>

</div>

<div class="content">

<div class="card">
<h3 id="top10Title" style="color:var(--t-light)">En İyi 10 Performans</h3>
<div class="chart-container">
<canvas id="top10Chart"></canvas>
</div>
</div>

</div>

<script>

let YENI=[];
let ESKI=[];
let radarChart,regionRadarChart,top10Chart;

const labels=['Bütçe','Yenileme','Fesih','Rollout','Sabit','İşlem'];

function toggleTheme(){

const body=document.body;
const btn=document.getElementById('themeToggle');

if(body.getAttribute('data-theme')==='light'){
body.removeAttribute('data-theme');
btn.innerText='GÜNDÜZ MODUNA GEÇ';
Chart.defaults.color='#ccc';
}
else{
body.setAttribute('data-theme','light');
btn.innerText='GECE MODUNA GEÇ';
Chart.defaults.color='#333';
}

runDashboard();

}

async function init(){

const fetchCSV=url=>new Promise(res=>

Papa.parse(url+'?v='+Date.now(),{
download:true,
header:true,
complete:d=>res(d.data)
})

);

const[d1,d2]=await Promise.all([
fetchCSV('data.csv'),
fetchCSV('eski_data.csv')
]);

const map=d=>d.filter(r=>r['KİRALAMA SORUMLUSU']).map(r=>({

name:r['KİRALAMA SORUMLUSU'].trim(),
region:r['BÖLGE'].trim(),
score:parseFloat(r['Puan']||0),

breakdown:[
parseFloat(r['BÜTÇE DEĞİŞİM']||0),
parseFloat(r['YENİLEME']||0),
parseFloat(r['FESİH İBRA']||0),
parseFloat(r['ROLLOUT']||0),
parseFloat(r['SABİT ARTIŞ']||0),
parseFloat(r['GENEL İŞLEM']||0)
]

}));

YENI=map(d1);
ESKI=map(d2);

runDashboard();

}

window.onload=init;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkcell 6 Sigma Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --t-blue: #001a35; --t-yellow: #FFCB05; --t-light: #0047BB; 
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #ffffff;
            --up-green: #00ff00; --down-red: #ff3333; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: row; }
        .sidebar { width: 320px; background: var(--t-blue); height: 100vh; color: white; padding: 25px; position: fixed; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #333; z-index: 1000; }
        .sidebar-logo { width: 100%; max-width: 250px; margin: 0 auto 30px; display: block; }
        .sidebar h2 { color: var(--t-yellow); border-bottom: 2px solid var(--t-yellow); padding-bottom: 10px; margin-bottom: 25px; font-size: 1.1rem; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.85rem; color: #ccc; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 0.95rem; background: #2d2d2d; color: white; cursor: pointer; }
        .content { margin-left: 320px; padding: 30px; width: calc(100% - 320px); box-sizing: border-box; }
        .header { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 10px solid var(--t-yellow); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px; border: 1px solid #333; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .kpi-box { background: #2d2d2d; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .kpi-box span { font-size: 0.65rem; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        .kpi-box h3 { margin: 0; color: white; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .trend-pill { font-size: 0.8rem; font-weight: 900; padding: 2px 8px; border-radius: 4px; margin-left: 5px; }
        .trend-up { color: #000 !important; background: var(--up-green); }
        .trend-down { color: #fff !important; background: var(--down-red); }
        .trend-stable { color: #999; background: #333; }
        .performance-list { list-style: none; padding: 0; margin: 20px 0 0; border-top: 1px solid #444; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #333; }
        .val-num { font-weight: bold; color: var(--t-yellow); font-size: 1rem; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        
        /* Personel Tablosu */
        .staff-table { width: 100%; border-collapse: collapse; margin-top: 15px; color: #ddd; font-size: 0.9rem; }
        .staff-table th { text-align: left; padding: 12px; border-bottom: 2px solid #444; color: var(--t-yellow); }
        .staff-table td { padding: 10px; border-bottom: 1px solid #333; }
        .staff-table tr:hover { background: rgba(255,203,5,0.05); }

        @media screen and (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; padding: 15px; }
            .content { margin-left: 0; width: 100%; padding: 10px; }
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .chart-container { height: 250px; }
            div[style*="display: grid"] { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="image_3.png" alt="Turkcell Logo" class="sidebar-logo">
    <h2>DÖNEMSEL ANALİZ</h2>
    
    <label>1. BÖLGE FİLTRESİ</label>
    <select id="regionSelect" onchange="runDashboard()">
        <option value="Hepsi">Tüm Türkiye</option>
        <option value="Adana">Adana</option><option value="Ankara">Ankara</option><option value="Antalya">Antalya</option>
        <option value="Asya">Asya</option><option value="Avrupa">Avrupa</option><option value="Bursa">Bursa</option>
        <option value="Diyarbakır">Diyarbakır</option><option value="İzmir">İzmir</option><option value="Trabzon">Trabzon</option>
    </select>

    <label>2. SIRALAMA KRİTERİ (TOP 10)</label>
    <select id="metricFilter" onchange="updateTop10Chart()">
        <option value="-1">Toplam Puan</option>
        <option value="0">Bütçe Değişim</option>
        <option value="1">Yenileme</option>
        <option value="2">Fesih İbra</option>
        <option value="3">Rollout</option>
        <option value="4">Sabit Artış</option>
        <option value="5">Genel İşlem</option>
    </select>

    <label>3. PERSONEL SEÇİMİ</label>
    <select id="personSelect" onchange="updateView()"></select>
</div>

<div class="content">
    <div class="header">
        <h1>6 Sigma Performans Analiz Paneli</h1>
        <div style="color: var(--t-yellow); font-weight: bold;">Aralık 2025 Verileri</div>
    </div>

    <div class="card">
        <h3 class="chart-title" id="top10Title">En İyi 10 Performans</h3>
        <div class="chart-container" style="height: 400px;"><canvas id="top10Chart"></canvas></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h3 class="chart-title" id="personTitle">Kişi Karnesi</h3>
            <div class="kpi-grid">
                <div class="kpi-box"><span>BÖLGE</span><h3 id="kpiRegion">-</h3></div>
                <div class="kpi-box"><span>PUAN</span><h3><span id="kpiScore">0</span> <span id="totalTrend" class="trend-pill"></span></h3></div>
                <div class="kpi-box"><span>SIRA</span><h3 id="kpiRank">#0</h3></div>
            </div>
            <div class="chart-container" style="margin-top:20px;"><canvas id="radarChart"></canvas></div>
            <ul class="performance-list" id="trendDetailList"></ul>
        </div>

        <div class="card">
            <h3 class="chart-title" id="regionTitle">Bölge Karnesi</h3>
            <div class="kpi-grid">
                <div class="kpi-box"><span>BÖLGE</span><h3 id="regKpiName">-</h3></div>
                <div class="kpi-box"><span>ORT.</span><h3><span id="regKpiScore">0</span> <span id="regTotalTrend" class="trend-pill"></span></h3></div>
                <div class="kpi-box"><span>SIRA</span><h3 id="regKpiRank">#0</h3></div>
            </div>
            <div class="chart-container" style="margin-top:20px;"><canvas id="regionRadarChart"></canvas></div>
            <ul class="performance-list" id="regTrendDetailList"></ul>
        </div>
    </div>

    <div class="card">
        <h3 class="chart-title">Tüm Personel Sıralama Listesi</h3>
        <table class="staff-table" id="staffTable">
            <thead>
                <tr>
                    <th>Sıra</th>
                    <th>Bölge</th>
                    <th>İsim Soyisim</th>
                    <th>Toplam Puan</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

    let radarChart, regionRadarChart, top10Chart;
    const labels = ['Bütçe', 'Yenileme', 'Fesih', 'Rollout', 'Sabit', 'İşlem'];

    Chart.defaults.color = '#ccc';
    Chart.defaults.borderColor = '#444';

    function initCharts() {
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        };

        const radarOptions = {
            ...commonOptions,
            scales: { 
                r: { 
                    suggestMax: 25, 
                    ticks: { display: false }, 
                    grid: { color: '#333' },
                    angleLines: { color: '#333' }
                } 
            }
        };

        radarChart = new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: { labels: labels, datasets: [
                { data: [0,0,0,0,0,0], backgroundColor: 'rgba(255, 203, 5, 0.2)', borderColor: '#FFCB05', borderWidth: 2 },
                { data: [25, 20, 20, 15, 10, 10], backgroundColor: 'rgba(255, 255, 255, 0.05)', borderColor: 'rgba(255, 255, 255, 0.1)', borderDash: [5,5], fill: true, pointRadius: 0 }
            ]},
            options: radarOptions
        });

        regionRadarChart = new Chart(document.getElementById('regionRadarChart'), {
            type: 'radar',
            data: { labels: labels, datasets: [
                { data: [0,0,0,0,0,0], backgroundColor: 'rgba(0, 255, 0, 0.1)', borderColor: '#00ff00', borderWidth: 2 },
                { data: [25, 20, 20, 15, 10, 10], backgroundColor: 'rgba(255, 255, 255, 0.05)', borderColor: 'rgba(255, 255, 255, 0.1)', borderDash: [5,5], fill: true, pointRadius: 0 }
            ]},
            options: radarOptions
        });

        top10Chart = new Chart(document.getElementById('top10Chart'), {
            type: 'bar',
            data: { labels: [], datasets: [{ data: [], backgroundColor: '#0047BB', borderRadius: 5 }] },
            options: { 
                ...commonOptions, 
                indexAxis: 'y',
                scales: { 
                    x: { grid: { display: false }, beginAtZero: true, max: 100 },
                    y: { grid: { display: false } }
                }
            }
        });
    }

    function calculateStats(dataList, regionName) {
        const filtered = regionName === 'Hepsi' ? dataList : dataList.filter(x => x.region === regionName);
        if (filtered.length === 0) return { score: 0, breakdown: [0,0,0,0,0,0] };
        const avgScore = filtered.reduce((acc, x) => acc + x.score, 0) / filtered.length;
        const avgBreakdown = [0,1,2,3,4,5].map(i => filtered.reduce((acc, x) => acc + x.breakdown[i], 0) / filtered.length);
        return { name: regionName === 'Hepsi' ? 'Türkiye' : regionName, score: avgScore.toFixed(2), breakdown: avgBreakdown.map(v => v.toFixed(2)) };
    }

    function filterPeople() {
        const region = document.getElementById('regionSelect').value;
        const pSelect = document.getElementById('personSelect');
        pSelect.innerHTML = '';
        const filtered = region === 'Hepsi' ? YENI_DONEM_VERISI : YENI_DONEM_VERISI.filter(x => x.region === region);
        
        filtered.sort((a,b) => b.score - a.score).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.name; opt.innerHTML = p.name + " (" + p.score + ")";
            pSelect.appendChild(opt);
        });

        updateTop10Chart();
        updateRegionCard(region);
        updateView();
        updateStaffTable(filtered); // Tabloyu güncelle
    }

    function updateTop10Chart() {
        const reg = document.getElementById('regionSelect').value;
        const metricIdx = parseInt(document.getElementById('metricFilter').value);
        const filtered = reg === 'Hepsi' ? YENI_DONEM_VERISI : YENI_DONEM_VERISI.filter(x => x.region === reg);
        
        const sorted = [...filtered].sort((a, b) => {
            const valA = metricIdx === -1 ? a.score : a.breakdown[metricIdx];
            const valB = metricIdx === -1 ? b.score : b.breakdown[metricIdx];
            return valB - valA;
        });

        const top10 = sorted.slice(0, 10);
        top10Chart.data.labels = top10.map(x => x.name);
        top10Chart.data.datasets[0].data = top10.map(x => (metricIdx === -1 ? x.score : x.breakdown[metricIdx]));
        
        const metricLabel = document.getElementById('metricFilter').options[document.getElementById('metricFilter').selectedIndex].text;
        document.getElementById('top10Title').innerText = `${reg} - ${metricLabel} (En İyi 10)`;
        top10Chart.update();
    }

    function updateRegionCard(regionName) {
        const cur = calculateStats(YENI_DONEM_VERISI, regionName);
        const prev = calculateStats(ESKI_DONEM_VERISI, regionName);
        document.getElementById('regKpiName').innerText = cur.name;
        document.getElementById('regKpiScore').innerText = cur.score;
        
        const regions = ['Adana', 'Ankara', 'Antalya', 'Asya', 'Avrupa', 'Bursa', 'Diyarbakır', 'İzmir', 'Trabzon'];
        const rankings = regions.map(r => ({ name: r, score: parseFloat(calculateStats(YENI_DONEM_VERISI, r).score) })).sort((a,b) => b.score - a.score);
        const rank = regionName === 'Hepsi' ? '-' : (rankings.findIndex(r => r.name === regionName) + 1);
        document.getElementById('regKpiRank').innerText = rank === '-' ? '-' : "#" + rank;
        document.getElementById('regionTitle').innerText = `${cur.name} Bölge Karnesi`;

        setTrendUI(document.getElementById('regTotalTrend'), (cur.score - prev.score).toFixed(2));
        regionRadarChart.data.datasets[0].data = cur.breakdown;
        regionRadarChart.update();
        
        const list = document.getElementById('regTrendDetailList');
        list.innerHTML = '';
        cur.breakdown.forEach((val, i) => {
            const diff = (val - prev.breakdown[i]).toFixed(2);
            const tClass = diff > 0 ? 'trend-up' : (diff < 0 ? 'trend-down' : 'trend-stable');
            list.innerHTML += `<li class="list-item"><span>${labels[i]}</span><div class="value-box"><span class="val-num">${val}</span><span class="trend-pill ${tClass}">${diff > 0 ? '▲ +' : (diff < 0 ? '▼ ' : '● ')}${diff}</span></div></li>`;
        });
    }

    function updateView() {
        const name = document.getElementById('personSelect').value;
        const cur = YENI_DONEM_VERISI.find(x => x.name === name);
        const prev = ESKI_DONEM_VERISI.find(x => x.name === name) || { score: 0, breakdown: [0,0,0,0,0,0] };
        if(!cur) return;

        document.getElementById('personTitle').innerText = `${cur.name} Karnesi`;
        document.getElementById('kpiRegion').innerText = cur.region;
        document.getElementById('kpiScore').innerText = cur.score;
        document.getElementById('kpiRank').innerText = "#" + (YENI_DONEM_VERISI.findIndex(x => x.name === name) + 1);
        setTrendUI(document.getElementById('totalTrend'), (cur.score - prev.score).toFixed(2));
        radarChart.data.datasets[0].data = cur.breakdown;
        radarChart.update();

        const list = document.getElementById('trendDetailList');
        list.innerHTML = '';
        cur.breakdown.forEach((val, i) => {
            const diff = (val - prev.breakdown[i]).toFixed(2);
            const tClass = diff > 0 ? 'trend-up' : (diff < 0 ? 'trend-down' : 'trend-stable');
            list.innerHTML += `<li class="list-item"><span>${labels[i]}</span><div class="value-box"><span class="val-num">${val}</span><span class="trend-pill ${tClass}">${diff > 0 ? '▲ +' : (diff < 0 ? '▼ ' : '● ')}${diff}</span></div></li>`;
        });
    }

    function updateStaffTable(data) {
        const tbody = document.querySelector('#staffTable tbody');
        tbody.innerHTML = '';
        data.sort((a,b) => b.score - a.score).forEach((p, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${idx + 1}</td><td>${p.region}</td><td>${p.name}</td><td class="val-num">${p.score}</td>`;
            tbody.appendChild(tr);
        });
    }

    function setTrendUI(el, val) {
        el.className = 'trend-pill ' + (val > 0 ? 'trend-up' : (val < 0 ? 'trend-down' : 'trend-stable'));
        el.innerText = (val > 0 ? '▲ +' : (val < 0 ? '▼ ' : '● ')) + val;
    }

    window.onload = () => { initCharts(); filterPeople(); };
</script>

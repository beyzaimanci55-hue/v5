<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkcell 6 Sigma Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --t-blue: #001a35; --t-yellow: #FFCB05; --t-light: #0047BB;
            --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #ffffff;
            --up-green: #00ff00; --down-red: #ff3333; --border: #333; --kpi-bg: #2d2d2d;
        }
        /* Aydınlık Mod Değişkenleri */
        [data-theme="light"] {
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #1a1a1a;
            --border: #ddd; --kpi-bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: row; transition: all 0.3s ease; }

        .sidebar { width: 320px; background: var(--t-blue); height: 100vh; color: white; padding: 25px; position: fixed; box-sizing: border-box; overflow-y: auto; border-right: 1px solid #333; z-index: 1000; }
        .sidebar-logo { width: 100%; max-width: 250px; margin: 0 auto 30px; display: block; }
        .sidebar h2 { color: var(--t-yellow); border-bottom: 2px solid var(--t-yellow); padding-bottom: 10px; margin-bottom: 25px; font-size: 1.1rem; }

        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.85rem; color: #ccc; }
        select, .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 0.95rem; background: #2d2d2d; color: white; cursor: pointer; outline: none; }

        /* Tema Butonu */
        .theme-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--t-yellow); color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 0.9rem; }

        .content { margin-left: 320px; padding: 30px; width: calc(100% - 320px); box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 25px; border: 1px solid var(--border); transition: background 0.3s; }

        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .kpi-box { background: var(--kpi-bg); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .kpi-box span { font-size: 0.6rem; color: #888; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        .kpi-box h3 { margin: 0; color: var(--text); font-size: 1rem; }

        .trend-pill { font-size: 0.75rem; font-weight: 900; padding: 2px 8px; border-radius: 4px; margin-left: 5px; }
        .trend-up { color: #000 !important; background: var(--up-green); }
        .trend-down { color: #fff !important; background: var(--down-red); }

        .performance-list { list-style: none; padding: 0; margin: 20px 0 0; border-top: 1px solid var(--border); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .val-num { font-weight: bold; color: var(--t-light); }

        .staff-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .staff-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--t-light); }
        .staff-table td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text); }

        .chart-container { position: relative; height: 350px; width: 100%; }

        @media screen and (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; }
            .content { margin-left: 0; width: 100%; padding: 15px; }
            .kpi-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="Image_12.png" alt="Turkcell Logo" class="sidebar-logo">
    <h2>DÖNEMSEL ANALİZ</h2>

    <label>BÖLGE FİLTRESİ</label>
    <select id="regionSelect" onchange="runDashboard()"><option value="Hepsi">Tüm Türkiye</option></select>

    <label>SIRALAMA KRİTERİ</label>
    <select id="metricFilter" onchange="updateTop10Chart()">
        <option value="-1">Toplam Puan</option>
        <option value="0">Bütçe Değişim</option>
        <option value="1">Yenileme</option>
        <option value="2">Fesih İbra</option>
        <option value="3">Rollout</option>
        <option value="4">Sabit Artış</option>
        <option value="5">Genel İşlem</option>
    </select>

    <label>PERSONEL SEÇİMİ</label>
    <select id="personSelect" onchange="updateView()"></select>

    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">GÜNDÜZ MODUNA GEÇ</button>
</div>

<div class="content">
    <div class="card">
        <h3 class="chart-title" id="top10Title" style="color:var(--t-light)">En İyi 10 Performans</h3>
        <div class="chart-container"><canvas id="top10Chart"></canvas></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <h3 id="personTitle" style="color:var(--t-light)">Kişi Karnesi</h3>
            <div class="kpi-grid" id="pKpis"></div>
            <div class="chart-container"><canvas id="radarChart"></canvas></div>
            <ul class="performance-list" id="trendDetailList"></ul>
        </div>
        <div class="card">
            <h3 id="regionTitle" style="color:var(--t-light)">Bölge Karnesi</h3>
            <div class="kpi-grid" id="rKpis"></div>
            <div class="chart-container"><canvas id="regionRadarChart"></canvas></div>
            <ul class="performance-list" id="regTrendDetailList"></ul>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--t-light)">Personel Sıralama Listesi</h3>
        <input type="text" id="staffSearch" class="search-box" placeholder="İsim veya Bölge Ara..." onkeyup="searchTable()">
        <table class="staff-table" id="staffTable">
            <thead><tr><th>Bölge</th><th>İsim Soyisim</th><th>Puan</th><th>Sıra</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let YENI = [], ESKI = [];
let radarChart, regionRadarChart, top10Chart;
const labels = ['Bütçe', 'Yenileme', 'Fesih', 'Rollout', 'Sabit', 'İşlem'];

// Tema Değiştirme
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    if (body.getAttribute('data-theme') === 'light') {
        body.removeAttribute('data-theme');
        btn.innerText = 'GÜNDÜZ MODUNA GEÇ';
        Chart.defaults.color = '#ccc';
    } else {
        body.setAttribute('data-theme', 'light');
        btn.innerText = 'GECE MODUNA GEÇ';
        Chart.defaults.color = '#333';
    }
    runDashboard();
}

async function init() {
    const fetchCSV = url => new Promise(res => Papa.parse(url, {download: true, header: true, complete: d => res(d.data)}));
    const [d1, d2] = await Promise.all([fetchCSV('data.csv'), fetchCSV('eski_data.csv')]);
    const map = d => d.filter(r => r['KİRALAMA SORUMLUSU']).map(r => ({
        name: r['KİRALAMA SORUMLUSU'].trim(), region: r['BÖLGE'].trim(), score: parseFloat(r['Puan'] || 0),
        breakdown: [parseFloat(r['BÜTÇE DEĞİŞİM']||0), parseFloat(r['YENİLEME']||0), parseFloat(r['FESİH İBRA']||0), parseFloat(r['ROLLOUT']||0), parseFloat(r['SABİT ARTIŞ']||0), parseFloat(r['GENEL İŞLEM']||0)]
    }));
    YENI = map(d1); ESKI = map(d2);

    const rSel = document.getElementById('regionSelect');
    [...new Set(YENI.map(x => x.region))].sort().forEach(r => { let o = document.createElement('option'); o.value = r; o.text = r; rSel.add(o); });

    initCharts();
    runDashboard();
}

function initCharts() {
    const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
    const rdr = { ...common, scales: { r: { suggestMax: 25, ticks: { display: false }, grid: { color: 'rgba(128,128,128,0.2)' } } } };

    // RADAR HEDEF ALANI (Şeffaf tavan puanı)
    const targetDataset = {
        label: 'Hedef', data: [25, 20, 20, 15, 10, 10],
        backgroundColor: 'rgba(255, 255, 255, 0.05)', borderColor: 'rgba(255, 255, 255, 0.2)', borderDash: [5, 5], fill: true, pointRadius: 0
    };

    top10Chart = new Chart(document.getElementById('top10Chart'), { type: 'bar', data: { labels: [], datasets: [{ data: [], backgroundColor: '#0047BB' }] }, options: { ...common, indexAxis: 'y' } });
    radarChart = new Chart(document.getElementById('radarChart'), { type: 'radar', data: { labels: labels, datasets: [{ data: [], borderColor: '#FFCB05', backgroundColor: 'rgba(255,203,5,0.2)', borderWidth:2 }, targetDataset] }, options: rdr });
    regionRadarChart = new Chart(document.getElementById('regionRadarChart'), { type: 'radar', data: { labels: labels, datasets: [{ data: [], borderColor: '#00ff00', backgroundColor: 'rgba(0,255,0,0.1)', borderWidth:2 }, targetDataset] }, options: rdr });
}

function runDashboard() {
    const reg = document.getElementById('regionSelect').value;
    const pSel = document.getElementById('personSelect');
    const filtered = reg === 'Hepsi' ? YENI : YENI.filter(x => x.region === reg);

    pSel.innerHTML = '';
    filtered.sort((a,b) => b.score - a.score).forEach(p => {
        let o = document.createElement('option'); o.value = p.name; o.text = `${p.name} (${p.score.toFixed(2)})`; pSel.add(o);
    });

    updateTop10Chart();
    updateRegionCard(reg);
    updateView();
    updateStaffTable();
}

function updateTop10Chart() {
    const reg = document.getElementById('regionSelect').value;
    const mIdx = parseInt(document.getElementById('metricFilter').value);
    const filtered = reg === 'Hepsi' ? YENI : YENI.filter(x => x.region === reg);
    const sorted = [...filtered].sort((a,b) => (mIdx === -1 ? b.score - a.score : b.breakdown[mIdx] - a.breakdown[mIdx])).slice(0, 10);

    top10Chart.data.labels = sorted.map(x => x.name);
    top10Chart.data.datasets[0].data = sorted.map(x => (mIdx === -1 ? x.score : x.breakdown[mIdx]));
    const mLab = document.getElementById('metricFilter').options[document.getElementById('metricFilter').selectedIndex].text;
    document.getElementById('top10Title').innerText = `${reg} - En İyi 10 (${mLab})`;
    top10Chart.update();
}

function updateRegionCard(rName) {
    const d = rName === 'Hepsi' ? YENI : YENI.filter(x => x.region === rName);
    const oldD = rName === 'Hepsi' ? ESKI : ESKI.filter(x => x.region === rName);
    const avg = arr => arr.length ? (arr.reduce((a, b) => a + b.score, 0) / arr.length) : 0;
    const curA = avg(d), prevA = avg(oldD);

    document.getElementById('regionTitle').innerText = `${rName} Bölge Karnesi`;
    document.getElementById('rKpis').innerHTML = `
        <div class="kpi-box"><span>BÖLGE</span><h3>${rName === 'Hepsi' ? 'TR' : rName}</h3></div>
        <div class="kpi-box"><span>ORTALAMA</span><h3>${curA.toFixed(2)}</h3></div>
        <div class="kpi-box"><span>TREND</span><h3><span class="trend-pill ${curA-prevA>=0?'trend-up':'trend-down'}">${curA-prevA>=0?'▲ +':'▼ '}${(curA-prevA).toFixed(2)}</span></h3></div>`;

    const brk = [0,1,2,3,4,5].map(i => (d.reduce((a, b) => a + b.breakdown[i], 0) / d.length));
    const oldBrk = [0,1,2,3,4,5].map(i => (oldD.length ? (oldD.reduce((a, b) => a + b.breakdown[i], 0) / oldD.length) : 0));

    regionRadarChart.data.datasets[0].data = brk.map(v => v.toFixed(2));
    regionRadarChart.update();

    const list = document.getElementById('regTrendDetailList');
    list.innerHTML = '';
    brk.forEach((v, i) => {
        const diff = (v - (oldBrk[i] || 0)).toFixed(2);
        list.innerHTML += `<li class="list-item"><span>${labels[i]}</span><div><span class="val-num">${v.toFixed(2)}</span><span class="trend-pill ${diff>=0?'trend-up':'trend-down'}">${diff>=0?'+':''}${diff}</span></div></li>`;
    });
}

function updateView() {
    const n = document.getElementById('personSelect').value;
    const p = YENI.find(x => x.name === n);
    const old = ESKI.find(x => x.name === n) || { score: 0, breakdown: [0,0,0,0,0,0] };
    if(!p) return;

    document.getElementById('personTitle').innerText = `${p.name} Karnesi`;
    document.getElementById('pKpis').innerHTML = `
        <div class="kpi-box"><span>BÖLGE</span><h3>${p.region}</h3></div>
        <div class="kpi-box"><span>PUAN</span><h3>${p.score.toFixed(2)}</h3></div>
        <div class="kpi-box"><span>TREND</span><h3><span class="trend-pill ${p.score-old.score>=0?'trend-up':'trend-down'}">${p.score-old.score>=0?'▲ +':'▼ '}${(p.score-old.score).toFixed(2)}</span></h3></div>`;

    radarChart.data.datasets[0].data = p.breakdown;
    radarChart.update();

    const list = document.getElementById('trendDetailList');
    list.innerHTML = '';
    p.breakdown.forEach((v, i) => {
        const d = (v - old.breakdown[i]).toFixed(2);
        list.innerHTML += `<li class="list-item"><span>${labels[i]}</span><div><span class="val-num" style="margin-right:10px">${v.toFixed(2)}</span><span class="trend-pill ${d>=0?'trend-up':'trend-down'}">${d>=0?'+':''}${d}</span></div></li>`;
    });
}

function updateStaffTable() {
    const tbody = document.querySelector('#staffTable tbody');
    tbody.innerHTML = '';
    YENI.sort((a,b)=>b.score-a.score).forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.region}</td><td>(${p.region}) ${p.name}</td><td class="val-num">${p.score.toFixed(2)}</td><td>${i+1}</td>`;
        tbody.appendChild(tr);
    });
}

function searchTable() {
    const input = document.getElementById('staffSearch').value.toUpperCase();
    const rows = document.querySelectorAll('#staffTable tbody tr');
    rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(input) ? '' : 'none');
}

window.onload = init;
</script>
</body>
</html>
